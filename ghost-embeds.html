<!-- BOX 1 — How the tax works -->
<div class="vc-embed-pat1" style="margin:1.5em 0;">
  <div style="position:relative;width:100%;border:1px solid #111;overflow:hidden;">
    <iframe class="vc-embed-pat1__iframe"
      src="https://vitalcity-nyc.github.io/pied-a-terre-surcharge/box1.html?embed=1"
      title="How the surcharge works, and who has to do what"
      loading="lazy" scrolling="no"
      style="display:block;width:100%;height:1100px;border:0;background:transparent;"></iframe>
  </div>
  <script>
    (function(){window.addEventListener('message',function(e){var d=e&&e.data;
      if(!d||d.type!=='vc-embed-height'||d.id!=='pat-box1')return;
      var f=document.querySelector('.vc-embed-pat1__iframe');
      if(f&&typeof d.height==='number')f.style.height=d.height+'px';});})();
  </script>
</div>
